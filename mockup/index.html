<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Commander — Mockups</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: #0f0f0f; color: #fff; display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 200px; min-width: 200px; background: #1a1a1a; border-left: 1px solid #2a2a2a;
      display: flex; flex-direction: column; padding: 16px 0;
    }
    #sidebar .logo {
      padding: 0 18px 20px; font-size: 13px; font-weight: 700; color: #fff;
      border-bottom: 1px solid #2a2a2a; margin-bottom: 12px; letter-spacing: 0.05em;
    }
    #sidebar .logo span { color: #666; font-weight: 400; }

    nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px; font-size: 13px; color: #aaa; text-decoration: none;
      border-right: 3px solid transparent; cursor: pointer; transition: background 0.1s;
    }
    nav a:hover { background: #242424; color: #fff; }
    nav a.active { background: #242424; color: #fff; border-right-color: #fff; }
    nav a .icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto; padding: 14px 18px; border-top: 1px solid #2a2a2a;
      font-size: 11px; color: #444;
    }
    #reload-indicator {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #2ecc71; margin-left: 6px; vertical-align: middle;
    }
    #reload-indicator.reloading { background: #f39c12; }

    /* ── Preview ── */
    #preview-wrap { flex: 1; display: flex; flex-direction: column; background: #111; }

    #topbar {
      height: 40px; background: #161616; border-bottom: 1px solid #222;
      display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
    }
    #topbar .page-title { font-size: 12px; color: #666; }
    #topbar .url-bar {
      flex: 1; font-size: 11px; color: #444; font-family: monospace;
      background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 4px;
      padding: 3px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #topbar button {
      background: #2a2a2a; border: 1px solid #333; color: #aaa; border-radius: 4px;
      padding: 3px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
    }
    #topbar button:hover { background: #333; color: #fff; }

    iframe {
      flex: 1; border: none; width: 100%; background: #fff;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="logo">Commander <span>mockups</span></div>
  <nav id="nav">
    <a href="#" data-page="dashboard.html" class="active">
      <span class="icon">&#9632;</span> לוח בקרה
    </a>
    <a href="#" data-page="status.html">
      <span class="icon">&#9776;</span> מצב כוח אדם
    </a>
    <a href="#" data-page="scheduler.html">
      <span class="icon">&#9654;</span> שיבוץ יומי
    </a>
    <a href="#" data-page="soldiers.html">
      <span class="icon">&#9670;</span> ניהול חיילים
    </a>
    <a href="#" data-page="combat_clock.html">
      <span class="icon">&#9719;</span> שעון לחימה
    </a>
    <a href="#" data-page="tasks.html">
      <span class="icon">&#9632;</span> הגדרת משימות
    </a>
    <a href="#" data-page="mobile.html">
      <span class="icon">&#9651;</span> מובייל
    </a>
    <a href="#" data-page="components.html">
      <span class="icon">&#9711;</span> רכיבים
    </a>
  </nav>
  <div class="sidebar-footer">
    <span id="reload-indicator"></span> live reload
  </div>
</div>

<div id="preview-wrap">
  <div id="topbar">
    <span class="page-title" id="page-title">dashboard.html</span>
    <span class="url-bar" id="url-bar">http://localhost:3131/dashboard.html</span>
    <button onclick="reloadFrame()">&#8635; רענן</button>
  </div>
  <iframe id="frame" src="dashboard.html"></iframe>
</div>

<script>
  const frame = document.getElementById('frame');
  const nav = document.getElementById('nav');
  const indicator = document.getElementById('reload-indicator');
  const urlBar = document.getElementById('url-bar');
  const pageTitle = document.getElementById('page-title');

  let currentPage = 'dashboard.html';

  // Navigation
  nav.addEventListener('click', e => {
    const link = e.target.closest('a[data-page]');
    if (!link) return;
    e.preventDefault();
    nav.querySelectorAll('a').forEach(a => a.classList.remove('active'));
    link.classList.add('active');
    currentPage = link.dataset.page;
    loadPage(currentPage);
  });

  function loadPage(page) {
    frame.src = page;
    urlBar.textContent = 'http://localhost:3131/' + page;
    pageTitle.textContent = page;
  }

  function reloadFrame() {
    frame.contentWindow.location.reload();
  }

  // Live reload
  let knownVersion = null;

  async function checkVersion() {
    try {
      const r = await fetch('/api/version', { cache: 'no-store' });
      const { version } = await r.json();
      if (knownVersion === null) { knownVersion = version; return; }
      if (version !== knownVersion) {
        knownVersion = version;
        indicator.classList.add('reloading');
        reloadFrame();
        setTimeout(() => indicator.classList.remove('reloading'), 800);
      }
    } catch (e) {}
  }

  setInterval(checkVersion, 1000);
  checkVersion();
</script>
</body>
</html>
